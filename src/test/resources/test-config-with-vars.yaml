service:
  name: svc
  instance-id: inst-1
solace:
  host: ${SOLACE_HOST:-tcp://localhost:55555}
  vpn: BVPN
  username: logger
  password: ${SOLACE_PASSWORD}
  client-name: ${service.name}-${service.instance-id}
logging:
  service:
    level: INFO
    directory: ./logs
consumer:
  mode: DIRECT
  output:
    format: jsonl
    capture-schema: ./config/capture-schema.json
